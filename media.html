<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#f4f1ea;
  --surface:rgba(255,255,255,.72);
  --surface-solid:#ffffff;
  --border:rgba(17,24,39,.06);

  --text:#111827;
  --sub:#8b9098;

  --accent:#617b64;
  --accent-soft:#edf2ec;

  --shadow:0 14px 40px rgba(15,23,42,.05);
}

html,
body{
  width:100%;
  height:100%;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);

  overflow:hidden;

  padding:14px;
}

/* APP */

.viewer-shell{
  width:100%;
  height:calc(100vh - 28px);

  display:flex;

  overflow:hidden;

  border-radius:24px;

  background:rgba(255,255,255,.58);
  backdrop-filter:blur(22px);

  border:1px solid rgba(255,255,255,.55);

  box-shadow:var(--shadow);
}

/* LEFT PANEL */

.left-panel{
  flex:0 0 61%;
  min-width:420px;

  display:flex;
  flex-direction:column;

  background:rgba(255,255,255,.5);
}

/* RIGHT PANEL */

.right-panel{
  flex:1;

  display:flex;
  flex-direction:column;

  border-left:1px solid var(--border);

  background:rgba(255,255,255,.74);
}

/* PANEL HEADERS */

.panel-header{
  flex-shrink:0;

  padding:22px 24px 18px;

  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:20px;

  border-bottom:1px solid var(--border);
}

.panel-title{
  font-size:18px;
  font-weight:800;
  letter-spacing:-.03em;
}

.panel-sub{
  margin-top:3px;

  font-size:12px;
  color:var(--sub);
}

.back-btn{
  display:flex;
  align-items:center;
  gap:7px;

  height:36px;

  border:none;

  padding:0 14px 0 10px;

  border-radius:12px;

  background:var(--accent-soft);
  color:var(--accent);

  font-size:13px;
  font-weight:700;

  cursor:pointer;

  transition:.15s ease;

  flex-shrink:0;
}

.back-btn:hover{
  background:rgba(97,123,100,.18);
}

.back-btn svg{
  width:16px;
  height:16px;
  stroke:var(--accent);
}

.badge{
  height:28px;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:0 10px;

  border-radius:10px;

  background:var(--accent-soft);
  color:#71846f;

  font-size:11px;
  font-weight:700;
  letter-spacing:.05em;

  white-space:nowrap;
}

/* VIDEO SIDE */

.video-content{
  flex:1;

  display:flex;
  flex-direction:column;

  gap:14px;

  padding:18px;

  min-height:0;
}

.video-frame{
  flex:1;

  border-radius:24px;

  overflow:hidden;

  background:#000;

  position:relative;

  display:flex;
  align-items:center;
  justify-content:center;

  min-height:0;
}

.video-frame video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  display:block;
}

.video-empty{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#9ca3af;
  background:#000;
  z-index:1;
}

.video-frame .plyr{
  width:100%;
  height:100%;
}

/* Plyr theme */
.plyr--video .plyr__control--overlaid,
.plyr--video .plyr__control--overlaid:hover{
  background:var(--accent);
}

.plyr--full-ui input[type=range]{
  color:var(--accent);
}

.plyr__controls .plyr__control[data-plyr="play"]:hover,
.plyr__controls .plyr__control[data-plyr="play"].plyr__tab-focus{
  background:var(--accent);
}

.plyr--video .plyr__controls{
  border-radius:0 0 24px 24px;
}

/* RESIZER */

.resizer{
  width:4px;

  background:transparent;

  cursor:col-resize;

  transition:.15s ease;

  position:relative;
  z-index:10;

  flex-shrink:0;
}

.resizer:hover,
.resizer.dragging{
  background:rgba(97,123,100,.35);
}

/* NOTES SIDE */

.notes-content{
  flex:1;

  display:flex;
  flex-direction:column;

  gap:12px;

  padding:18px;

  min-height:0;
}

/* PDF SHELL */

.pdf-shell{
  flex:1;

  border-radius:20px;

  overflow:hidden;

  background:white;

  border:1px solid rgba(17,24,39,.06);

  position:relative;

  min-height:0;
}

/* pdf.js canvas scroll container */
.pdf-scroll{
  width:100%;
  height:100%;

  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;

  background:#e8e4dc;

  display:flex;
  flex-direction:column;

  align-items:center;

  gap:10px;

  padding:16px 12px;

  box-sizing:border-box;
}

/* each page canvas wrapper */
.pdf-page{
  background:white;

  box-shadow:0 2px 10px rgba(0,0,0,.12);

  border-radius:4px;

  overflow:hidden;

  flex-shrink:0;
}

.pdf-page canvas{
  display:block;
}

/* empty / loading states */
.pdf-state{
  position:absolute;
  inset:0;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:12px;

  color:#a0a7af;

  background:white;

  border-radius:20px;

  z-index:2;
}

.pdf-state.hidden{
  display:none;
}

.pdf-state svg{
  opacity:.55;
}

.pdf-state p{
  font-size:13px;
  font-weight:600;
}

.pdf-state small{
  font-size:11px;
}

/* loading spinner */
.pdf-spinner{
  width:28px;
  height:28px;

  border:3px solid var(--accent-soft);
  border-top-color:var(--accent);

  border-radius:50%;

  animation:spin .7s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* pdf nav bar */
.pdf-nav{
  flex-shrink:0;

  display:flex;
  align-items:center;
  gap:8px;
}

.pdf-nav-btn{
  height:30px;

  border:none;

  padding:0 12px;

  border-radius:8px;

  background:rgba(17,24,39,.05);

  color:#6b7280;

  font-size:12px;
  font-weight:700;

  cursor:pointer;

  transition:.15s ease;
}

.pdf-nav-btn:hover:not(:disabled){
  background:rgba(97,123,100,.08);
  color:var(--accent);
}

.pdf-nav-btn:disabled{
  opacity:.35;
  cursor:default;
}

.pdf-page-info{
  font-size:12px;
  font-weight:600;
  color:var(--sub);

  flex:1;
  text-align:center;
}

/* MOBILE PLYR — strip to essentials */
@media(max-width:980px){
  .plyr__controls [data-plyr="mute"],
  .plyr__controls [data-plyr="volume"],
  .plyr__controls [data-plyr="settings"],
  .plyr__volume{
    display:none !important;
  }

  .plyr__controls{
    padding:6px 10px !important;
    gap:6px !important;
  }

  .plyr__progress{
    flex:1;
  }

  .plyr__time{
    font-size:11px !important;
  }

  .plyr__control svg{
    width:16px !important;
    height:16px !important;
  }
}

/* MOBILE */

@media(max-width:980px){

  body{
    overflow:auto;
    padding:8px;
  }

  .viewer-shell{
    flex-direction:column;
    height:auto;
    min-height:100dvh;
    border-radius:16px;
  }

  .left-panel{
    flex:none !important;
    width:100% !important;
    min-width:unset !important;
  }

  .right-panel{
    flex:none;
    width:100%;
    border-left:none;
    border-top:1px solid var(--border);
  }

  .resizer{
    display:none;
  }

  /* tighter header on mobile */
  .panel-header{
    padding:14px 16px 12px;
    gap:10px;
    flex-wrap:wrap;
  }

  .panel-title{
    font-size:15px;
  }

  .panel-sub{
    font-size:11px;
  }

  /* hide CACHED badge on mobile to save space */
  .left-panel .badge{
    display:none;
  }

  .back-btn{
    height:32px;
    font-size:12px;
    padding:0 10px 0 8px;
    flex-shrink:0;
  }

  /* video fixed aspect ratio instead of flex-1 */
  .video-content{
    padding:12px;
    gap:10px;
  }

  .video-frame{
    flex:none;
    height:56vw;
    min-height:unset;
    border-radius:16px;
  }

  /* notes panel fixed height so PDF is usable */
  .notes-content{
    padding:12px;
    gap:8px;
  }

  .pdf-shell{
    height:65vh;
    min-height:unset;
    flex:none;
  }

}

<!-- pdf.js — ES module -->
<script type="module">
import { requireSession } from "./JS/session.js";
const session = await requireSession();
// Role check - teachers go to teacher.html
if (session.role !== "student") { window.location.href = "teacher.html"; }

import * as pdfjsLib from './dist/pdfjs/pdf.min.mjs';

/* ── PROGRESS SYNC (localStorage + Firestore) ── */
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const _fbConfig = {
  apiKey: "AIzaSyCXjaD4yArHvjzv1MtUbkmRUxcsFGg26fA",
  authDomain: "meridian-university-3b199.firebaseapp.com",
  projectId: "meridian-university-3b199",
  storageBucket: "meridian-university-3b199.firebasestorage.app",
  messagingSenderId: "179714904881",
  appId: "1:179714904881:web:f6fed2c0c99fc54a479610"
};
let _db = null;
try {
  const _fbApp = getApps().length ? getApps()[0] : initializeApp(_fbConfig);
  _db = getFirestore(_fbApp);
} catch(e) {}

const _progressKey = (lectureId) => `meridian_progress_${lectureId}`;

async function saveProgress(lectureId, videoTime, pdfPage) {
  const data = { videoTime, pdfPage, updatedAt: Date.now() };
  // Always write localStorage (works offline)
  localStorage.setItem(_progressKey(lectureId), JSON.stringify(data));
  // Firestore if online
  if (_db && navigator.onLine && session?.uid) {
    try {
      await setDoc(doc(_db, "playback_progress", session.uid + "_" + lectureId), {
        userId: session.uid, lectureId, videoTime, pdfPage, updatedAt: new Date()
      });
    } catch(e) { /* silent — localStorage is fallback */ }
  }
}

async function loadProgress(lectureId) {
  // Try Firestore first if online
  if (_db && navigator.onLine && session?.uid) {
    try {
      const snap = await getDoc(doc(_db, "playback_progress", session.uid + "_" + lectureId));
      if (snap.exists()) return snap.data();
    } catch(e) {}
  }
  // Fall back to localStorage
  try {
    const raw = localStorage.getItem(_progressKey(lectureId));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// Expose for second module script (two modules run concurrently — no shared scope)
window._loadProgress = loadProgress;
window._saveProgress = saveProgress;

// Push any pending localStorage progress to Firestore when coming online
window.addEventListener("online", async () => {
  if (!_db || !session?.uid) return;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key?.startsWith("meridian_progress_")) continue;
    try {
      const d = JSON.parse(localStorage.getItem(key));
      const lid = key.replace("meridian_progress_", "");
      await setDoc(doc(_db, "playback_progress", session.uid + "_" + lid), {
        userId: session.uid, lectureId: lid,
        videoTime: d.videoTime, pdfPage: d.pdfPage, updatedAt: new Date()
      });
    } catch(e) {}
  }
});

/* CRITICAL: local worker — offline-first.
   Safari iOS cannot run module workers — fall back to fake-worker (main thread). */
const _isSafariIOS = /iP(hone|ad|od)/.test(navigator.userAgent)
  && /WebKit/.test(navigator.userAgent)
  && !/CriOS|FxiOS/.test(navigator.userAgent);
pdfjsLib.GlobalWorkerOptions.workerSrc = _isSafariIOS
  ? ''
  : './dist/pdfjs/pdf.worker.min.mjs';

/* ── STATE ── */
let pdfDoc     = null;
let currentSrc = null;
let currentScale = 1;

/* ── ELEMENTS ── */
const pdfEmpty   = document.getElementById('pdfEmpty');
const pdfLoading = document.getElementById('pdfLoading');
const pdfScroll  = document.getElementById('pdfScroll');
const pdfNav     = document.getElementById('pdfNav');
const pdfPrev    = document.getElementById('pdfPrev');
const pdfNext    = document.getElementById('pdfNext');
const pdfInfo    = document.getElementById('pdfPageInfo');
const pdfZoomIn  = document.getElementById('pdfZoomIn');
const pdfZoomOut = document.getElementById('pdfZoomOut');
const pdfZoomFit = document.getElementById('pdfZoomFit');

/* ── FIT-TO-WIDTH SCALE ── */
function getFitScale(page){
  const viewport    = page.getViewport({ scale: 1 });
  /* measure pdfShell — always in layout, even when pdfScroll is hidden */
  const shell       = document.getElementById('pdfShell');
  const available   = shell.clientWidth - 24;
  return available / viewport.width;
}

/* ── UI STATES ── */
function showEmpty(){
  pdfEmpty.classList.remove('hidden');
  pdfLoading.classList.add('hidden');
  pdfScroll.classList.add('hidden');
  pdfNav.style.display = 'none';
}

function showLoading(){
  pdfEmpty.classList.add('hidden');
  pdfLoading.classList.remove('hidden');
  pdfScroll.classList.add('hidden');
  pdfNav.style.display = 'none';
}

function showPages(){
  pdfEmpty.classList.add('hidden');
  pdfLoading.classList.add('hidden');
  pdfScroll.classList.remove('hidden');
  pdfNav.style.display = 'flex';
}

/* ── RENDER ALL PAGES at given scale ── */
async function renderAll(doc, scale){
  pdfScroll.innerHTML = '';

  for(let i = 1; i <= doc.numPages; i++){
    const page     = await doc.getPage(i);
    const viewport = page.getViewport({ scale });

    const wrapper  = document.createElement('div');
    wrapper.className    = 'pdf-page';
    wrapper.dataset.page = i;

    const canvas   = document.createElement('canvas');
    canvas.width   = viewport.width;
    canvas.height  = viewport.height;

    wrapper.appendChild(canvas);
    pdfScroll.appendChild(wrapper);

    await page.render({
      canvasContext: canvas.getContext('2d'),
      viewport
    }).promise;
  }

  updatePageInfo();
}

/* ── RE-RENDER at new scale ── */
async function rerender(scale){
  if(!pdfDoc) return;
  currentScale = scale;
  showLoading();
  await renderAll(pdfDoc, scale);
  showPages();
}

/* ── PAGE INFO (scroll-based) ── */
function updatePageInfo(){
  if(!pdfDoc){ pdfInfo.textContent = '— / —'; return; }

  const pages   = pdfScroll.querySelectorAll('.pdf-page');
  const mid     = pdfScroll.scrollTop + pdfScroll.clientHeight / 2;
  let   current = 1;

  pages.forEach(p => {
    if(p.offsetTop <= mid) current = parseInt(p.dataset.page);
  });

  pdfInfo.textContent = `${current} / ${pdfDoc.numPages}`;
  pdfPrev.disabled    = current <= 1;
  pdfNext.disabled    = current >= pdfDoc.numPages;
}

pdfScroll.addEventListener('scroll', updatePageInfo);

/* ── NAV ── */
function scrollToPage(n){
  const target = pdfScroll.querySelector(`[data-page="${n}"]`);
  if(target) target.scrollIntoView({ behavior:'smooth' });
}

pdfPrev.addEventListener('click', () => {
  const cur = parseInt(pdfInfo.textContent.split(' / ')[0]) || 1;
  scrollToPage(Math.max(1, cur - 1));
});

pdfNext.addEventListener('click', () => {
  const cur = parseInt(pdfInfo.textContent.split(' / ')[0]) || 1;
  scrollToPage(Math.min(pdfDoc.numPages, cur + 1));
});

/* ── ZOOM ── */
pdfZoomIn.addEventListener('click',  () => rerender(currentScale + 0.2));
pdfZoomOut.addEventListener('click', () => rerender(Math.max(0.4, currentScale - 0.2)));
pdfZoomFit.addEventListener('click', async () => {
  const page = await pdfDoc.getPage(1);
  rerender(getFitScale(page));
});

/* ── MAIN LOAD FUNCTION ── */
window.loadPDF = async function(src){

  if(!src){ showEmpty(); return; }

  if(currentSrc && currentSrc.startsWith('blob:'))
    URL.revokeObjectURL(currentSrc);

  currentSrc = src;
  showLoading();

  try{
    pdfDoc = await pdfjsLib.getDocument(src).promise;

    /* FIX: compute fit scale before first render */
    const firstPage = await pdfDoc.getPage(1);
    currentScale = getFitScale(firstPage);

    await renderAll(pdfDoc, currentScale);
    showPages();
  } catch(err){
    console.error('pdf.js error:', err);
    pdfEmpty.querySelector('p').textContent    = 'Failed to load PDF';
    pdfEmpty.querySelector('small').textContent = err.message;
    showEmpty();
  }
};

/* ── Load PDF + restore progress ── */
(async () => {
  const fromCode = new URLSearchParams(window.location.search).get("from") || "DCS311";
  const weekNum  = new URLSearchParams(window.location.search).get("week")  || "9";
  const lectureId = fromCode + "_W" + weekNum;
  const { getById } = await import("./JS/db.js");
  let lectureRecord = await getById("lectures", lectureId);
  if (!lectureRecord) {
    try {
      const { syncFromSupabase } = await import("./JS/supabase.js");
      await syncFromSupabase();
      lectureRecord = await getById("lectures", lectureId);
    } catch (err) {
      console.warn("[media] Fallback sync failed:", err);
    }
  }
  const notesUrl = lectureRecord?.notesUrl || null;
  if (!notesUrl) {
    console.warn("[media] No notes PDF uploaded yet for", lectureId);
  }
  await window.loadPDF(notesUrl);
  // Restore PDF page from progress
  const prog = window._restoredProgress;
  if (prog?.pdfPage && prog.pdfPage > 1) {
    setTimeout(() => scrollToPage(prog.pdfPage), 400);
  }
})();

// Save video position + PDF page every 30s
setInterval(() => {
  if (!window._lectureId) return;
  const vt  = window._player?.currentTime || 0;
  const cur = parseInt((document.getElementById('pdfPageInfo')?.textContent || '').split(' / ')[0]) || 1;
  saveProgress(window._lectureId, vt, cur);
}, 30000);

</script>

<script>

/* ── PLYR ── */
const video = document.getElementById('lecturePlayer');
const empty = document.getElementById('videoEmpty');

window._player = null;

// mountVideo: registers SW token + mounts Plyr via virtual video filesystem.
// assetId = lecture.id UUID (stored in lectureRecord.videoUrl after new upload system).
window.mountVideo = async function mountVideo(assetId) {
  if (!assetId) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  try {
    const { mountVideoPlayer } = await import('./JS/S3.js');
    // Pass the video element directly (already in DOM) so Plyr wraps it
    const player = await mountVideoPlayer(assetId, video.parentElement);
    window._player = player;
  } catch (e) {
    console.error('[media] mountVideo failed:', e);
    empty.style.display = 'flex';
  }
};

// Real video is loaded once the lecture record is fetched, in the
// module script below mounts the actual video once lectureRecord is fetched.

/* ── OFFLINE DOWNLOAD + PLAYBACK ────────────────────────────────────────── */
</script>
<script type="module">
import { CacheJanitor } from "./JS/cache-janitor.js";

const fromCode  = new URLSearchParams(window.location.search).get("from") || "DCS311";
const weekNum   = new URLSearchParams(window.location.search).get("week")  || "9";
const weekTitle = new URLSearchParams(window.location.search).get("title") || "Lecture";
const lectureId = fromCode + "_W" + weekNum;

// Fetch the real lecture record (synced from Supabase into IndexedDB) so we
// play the actual uploaded video/PDF instead of a hardcoded test file.
const { getById } = await import("./JS/db.js");
let lectureRecord = await getById("lectures", lectureId);
if (!lectureRecord) {
  // Safety net: media.html is normally reached via course.html, which
  // already synced IndexedDB. If this page was opened directly (bookmark,
  // refresh), do a one-time sync before giving up and falling back.
  try {
    const { syncFromSupabase } = await import("./JS/supabase.js");
    await syncFromSupabase();
    lectureRecord = await getById("lectures", lectureId);
  } catch (err) {
    console.warn("[media] Fallback sync failed:", err);
  }
}
// videoUrl now stores the assetId (lecture UUID) — not a signed URL
const assetId = lectureRecord?.videoUrl || null;
if (!assetId) {
  console.warn("[media] No video uploaded yet for", lectureId);
}
// Wait for SW controller to be active before mounting (needed after first install)
async function waitForSWController(timeout = 4000) {
  if (navigator.serviceWorker.controller) return;
  await new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error('SW timeout')), timeout);
    navigator.serviceWorker.addEventListener('controllerchange', () => { clearTimeout(t); resolve(); }, { once: true });
  });
}
try {
  await waitForSWController();
} catch(e) {
  // SW installed but not yet controller — reload once to activate it
  if (!sessionStorage.getItem('sw_reload_done')) {
    sessionStorage.setItem('sw_reload_done', '1');
    location.reload();
  } else {
    console.warn('[media] SW not ready after reload:', e);
  }
}
window.mountVideo(assetId); // SW-backed streaming; shows empty state if null

// Expose lectureId globally for progress interval
window._lectureId = lectureId;

// Populate header
document.getElementById("lectureTitle").textContent = weekTitle;
document.getElementById("lectureSub").textContent   = "Week " + weekNum + " • Auto-Synced offline";

// Wait for first module to expose _loadProgress (modules run concurrently)
while (typeof window._loadProgress !== "function") {
  await new Promise(r => setTimeout(r, 20));
}
window._restoredProgress = await window._loadProgress(lectureId);

const downloadProgress = document.getElementById("downloadProgress");
const progressFill     = document.getElementById("downloadProgressFill");
const progressText     = document.getElementById("downloadProgressText");
const offlineBadge     = document.getElementById("offlineBadge");

if (assetId) {
  // totalChunks unknown at this point — MediaDownloader.getStatus() checks IDB
  // For already-cached: assemble blob and play offline (no SW needed)
  // For not-cached: download all chunks into IDB in background while SW streams
  const { MediaDownloader } = await import("./JS/S3.js");

  // Fetch totalChunks from storage_assets via proxy header on first chunk,
  // but we can read it from IDB download_metadata if already cached
  const meta = await MediaDownloader.getStatus(assetId);

  function markCached() {
    downloadProgress.style.display = "none";
    offlineBadge.style.display     = "";
  }

  if (meta.status === "complete") {
    // Already fully cached — play from blob (truly offline, no SW fetch needed)
    const dl       = new MediaDownloader(assetId, { type: "video" });
    const blobUrl  = await dl.getPlayableBlob();
    if (blobUrl) {
      // Replace SW-streamed src with local blob
      if (window._player) window._player.source = { type: "video", sources: [{ src: blobUrl, type: "video/mp4" }] };
    }
    markCached();
    CacheJanitor.touch(assetId);
    if (window._restoredProgress?.videoTime > 5) {
      window._player?.once("ready", () => {
        window._player.currentTime = window._restoredProgress.videoTime;
      });
    }
  } else {
    // Not cached → SW streams while we download chunks into IDB in background
    downloadProgress.style.display = "";

    // Need totalChunks — fetch from storage_assets table via a quick proxy call
    // The proxy returns X-Total-Chunks on every chunk response
    // We do a single chunk fetch just to learn totalChunks, then start downloader
    const { getById: _getById2 } = await import("./JS/db.js");
    const { getConfig } = await import("./JS/config.js");
    const { getAuth }   = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const token         = await getAuth().currentUser?.getIdToken();
    const { supabaseKey } = await getConfig(token).catch(() => ({ supabaseKey: "" }));
    const proxyBase     = (await import("./JS/config.js")).SUPABASE_URL + "/functions/v1/media-proxy";
    const res           = await fetch(`${proxyBase}?assetId=${encodeURIComponent(assetId)}&chunk=0`, {
      headers: { Authorization: `Bearer ${token}`, apikey: supabaseKey },
    });
    const totalChunks = parseInt(res.headers.get("X-Total-Chunks") || "1");

    const dl = new MediaDownloader(assetId, { type: "video", totalChunks });

    dl.onProgress = (pct) => {
      progressFill.style.width = pct + "%";
      progressText.textContent = "Caching offline… " + pct + "%";
    };

    dl.onComplete = async (blobUrl) => {
      // Swap SW stream for local blob now that it's fully cached
      if (window._player) window._player.source = { type: "video", sources: [{ src: blobUrl, type: "video/mp4" }] };
      markCached();
      CacheJanitor.touch(assetId);
      if (window._restoredProgress?.videoTime > 5) {
        window._player?.once("ready", () => {
          window._player.currentTime = window._restoredProgress.videoTime;
        });
      }
    };

    dl.onError = (err) => {
      downloadProgress.style.display = "none";
      console.warn("[media] Auto-cache failed (SW stream continues):", err);
    };

    dl.start(); // fire and forget — SW already streaming above
  }
} else {
  downloadProgress.style.display = "none";
}
</script>

<script>
/* ── RESIZER ── */
const resizer     = document.getElementById('resizer');
const leftPanel   = document.getElementById('leftPanel');
const viewerShell = document.getElementById('viewerShell');
let isDragging    = false;

resizer.addEventListener('mousedown', () => {
  isDragging = true;
  resizer.classList.add('dragging');
  document.body.style.userSelect = 'none';
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  resizer.classList.remove('dragging');
  document.body.style.userSelect = '';
});

document.addEventListener('mousemove', (e) => {
  if(!isDragging) return;
  const shellRect    = viewerShell.getBoundingClientRect();
  const newLeftWidth = ((e.clientX - shellRect.left) / shellRect.width) * 100;
  if(newLeftWidth < 35 || newLeftWidth > 75) return;
  leftPanel.style.flex = `0 0 ${newLeftWidth}%`;
});

/* ── BACK BUTTON ── */
const backBtn      = document.getElementById('backBtn');
const _backFromCode = new URLSearchParams(window.location.search).get('from');

// Set immediately on load so browser back button ALSO restores the course
if (_backFromCode) {
  sessionStorage.setItem('activeCourse', _backFromCode);
  sessionStorage.setItem('openCourseOnLoad', _backFromCode);
}

backBtn.addEventListener('click', () => {
  // openCourseOnLoad already set above; just navigate
  window.location.href = 'index.html';
});
</script>
