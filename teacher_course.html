<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Course | Meridian Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="manifest" href="/manifest.json">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
:root{
  --surface:rgba(255,255,255,.72); --border:rgba(17,24,39,.06);
  --text:#111827; --sub:#6b7280; --accent:#4f6b52;
  --shadow:0 10px 30px rgba(15,23,42,.05);
  --amber:#b7791f; --red:#c24141; --green:#3f7a54;
}
body{ font-family:"Inter",sans-serif; background:radial-gradient(circle at top left,#ebe5db 0%,transparent 26%),linear-gradient(to bottom,#faf9f7 0%,#f3f1eb 100%); color:var(--text); min-height:100vh; overflow-x:hidden; }
.navbar{ position:sticky; top:0; z-index:100; backdrop-filter:blur(18px); background:rgba(250,249,247,.82); border-bottom:1px solid var(--border); }
.nav-inner{ max-width:1400px; margin:auto; height:82px; padding:0 36px; display:flex; align-items:center; justify-content:space-between; gap:32px; }
.brand{ display:flex; align-items:center; gap:14px; flex-shrink:0; }
.logo{ width:46px; height:46px; border-radius:16px; background:linear-gradient(135deg,#586f58 0%,#94a88f 100%); display:grid; place-items:center; color:white; font-weight:700; font-size:15px; }
.logo img{ width:25px; height:auto; object-fit:contain; margin-left:0px; margin-top:5px; }
.brand-text{ display:flex; flex-direction:column; }
.brand-title{ font-size:15px; font-weight:700; letter-spacing:-.02em; }
.brand-sub{ font-size:12px; color:var(--sub); }
.nav-links{ display:flex; align-items:center; gap:12px; flex:1; justify-content:center; }
.nav-btn{ border:none; background:transparent; height:46px; padding:0 18px; border-radius:14px; display:flex; align-items:center; gap:10px; color:var(--sub); font-size:14px; font-weight:500; cursor:pointer; transition:.2s ease; }
.nav-btn svg{ width:18px; height:18px; }
.nav-btn:hover,.nav-btn.active{ background:#e8efe8; color:#4f6b52; }
/* Hamburger */
.hamburger{ display:none; width:44px; height:44px; border:none; background:transparent; border-radius:14px; cursor:pointer; flex-direction:column; align-items:center; justify-content:center; gap:5px; transition:.2s ease; }
.hamburger:hover{ background:#e8efe8; }
.hamburger span{ display:block; width:20px; height:2px; background:#6b7280; border-radius:2px; transition:.25s ease; }
.hamburger.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); background:#4f6b52; }
.hamburger.open span:nth-child(2){ opacity:0; transform:scaleX(0); }
.hamburger.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); background:#4f6b52; }
/* Mobile menu drawer */
.mobile-menu{ display:none; position:fixed; top:82px; left:0; right:0; background:rgba(250,249,247,.97); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); z-index:99; padding:12px 16px 16px; flex-direction:column; gap:4px; }
.mobile-menu.open{ display:flex; }
.mobile-menu .nav-btn{ width:100%; justify-content:flex-start; height:52px; font-size:15px; }
@media(max-width:950px){
  .nav-links{ display:none; }
  .hamburger{ display:flex; }
  .nav-inner{ padding:0 16px; }
  .brand-sub{ display:none; }
}
@media(max-width:1100px){ .content-grid{ grid-template-columns:1fr; } .sidebar{ position:relative; top:0; } .course-title{ font-size:42px; } .hero-top{ flex-direction:column; } .course-stats-strip{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:768px){ .page{ padding:16px 14px 30px; } .hero{ padding:24px; border-radius:26px; } .course-title{ font-size:30px; } .surface{ padding:18px; border-radius:22px; } .content-top{ flex-direction:column; } .assignment-row{ flex-direction:column; align-items:flex-start; } .course-stats-strip{ grid-template-columns:1fr 1fr; } .hero-actions{ flex-direction:column; align-items:stretch; } .hero-btn{ height:48px; } .section-head{ flex-wrap:wrap; gap:10px; } }
@media(max-width:480px){ .course-stats-strip{ grid-template-columns:1fr; } .course-title{ font-size:26px; } .content-left{ flex-direction:column; } }.page{ width:100%; max-width:1450px; margin:auto; padding:32px 28px 40px; }
.hero{ position:relative; overflow:hidden; border-radius:38px; padding:38px; color:white; margin-bottom:28px; box-shadow:0 25px 70px rgba(79,107,82,.14); }
.hero::before{ content:""; position:absolute; width:360px; height:360px; border-radius:50%; background:rgba(255,255,255,.06); top:-180px; right:-120px; }
.hero-top{ display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; }
.hero-left{ max-width:700px; }
.course-title{ font-size:54px; line-height:.95; font-weight:800; letter-spacing:-.06em; margin-bottom:18px; }
.course-meta{ color:rgba(255,255,255,.82); font-size:15px; line-height:1.8; }
.hero-actions{ display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap; }
.hero-btn{ height:54px; border:none; padding:0 24px; border-radius:18px; font-size:14px; font-weight:700; cursor:pointer; transition:.2s ease; position:relative; }
.hero-btn.primary{ background:white; color:var(--accent); }
.hero-btn.secondary{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); color:white; }
.hero-btn.danger-soft{ background:rgba(194,65,65,.18); border:1px solid rgba(255,255,255,.1); color:white; }
.content-grid{ display:grid; grid-template-columns:290px 1fr; gap:24px; }
.sidebar{ position:sticky; top:100px; height:fit-content; background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:30px; padding:20px; box-shadow:var(--shadow); }
.side-title{ font-size:12px; font-weight:700; letter-spacing:.14em; color:#9ca3af; margin-bottom:18px; }
.side-item{ height:54px; display:flex; align-items:center; justify-content:space-between; padding:0 18px; border-radius:16px; cursor:pointer; margin-bottom:10px; font-size:14px; font-weight:600; color:#4b5563; transition:.2s ease; }
.side-item:hover{ background:rgba(79,107,82,.06); }
.side-item.active{ background:var(--accent); color:white; }
.side-badge{ background:#ecfdf3; color:#15803d; font-size:11px; font-weight:800; padding:5px 10px; border-radius:999px; }
.side-item.active .side-badge{ background:rgba(255,255,255,.2); color:white; }
.main{ display:flex; flex-direction:column; gap:24px; }
.surface{ background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:32px; padding:28px; box-shadow:var(--shadow); }
.section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.section-title{ font-size:28px; font-weight:800; letter-spacing:-.05em; }
.section-link{ color:var(--accent); text-decoration:none; font-size:14px; font-weight:700; cursor:pointer; border:none; background:none; }
.section-link.add{ background:var(--accent); color:white; padding:10px 18px; border-radius:12px; font-size:13px; }
.section-link.start-now{ background:linear-gradient(135deg,#4f6b52,#7f9679); box-shadow:0 10px 22px rgba(79,107,82,.22); }
.content-scroll{ max-height:980px; overflow-y:auto; padding-right:6px; }
.content-scroll::-webkit-scrollbar{ width:8px; }
.content-scroll::-webkit-scrollbar-thumb{ background:rgba(79,107,82,.22); border-radius:20px; }
.content-list{ display:flex; flex-direction:column; gap:16px; }
.content-row{ background:white; border-radius:24px; border:1px solid rgba(17,24,39,.05); padding:22px; transition:.2s ease; }
.content-row:hover{ transform:translateY(-2px); box-shadow:0 12px 24px rgba(15,23,42,.05); }
.content-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:18px; }
.content-left{ display:flex; gap:16px; }
.week-badge{ min-width:58px; height:58px; border-radius:18px; background:rgba(79,107,82,.08); color:var(--accent); display:grid; place-items:center; font-size:13px; font-weight:800; }
.content-title{ font-size:20px; font-weight:700; margin-bottom:6px; }
.content-sub{ font-size:14px; color:var(--sub); line-height:1.7; }
.content-status{ background:#f3f4f6; color:#374151; padding:10px 14px; border-radius:12px; font-size:12px; font-weight:800; letter-spacing:.05em; white-space:nowrap; }
.live-pill{ background:linear-gradient(135deg,#4f6b52,#7f9679); color:white; padding:10px 16px; border-radius:14px; font-size:12px; font-weight:800; letter-spacing:.05em; box-shadow:0 10px 22px rgba(79,107,82,.18); white-space:nowrap; cursor:pointer; }
.resource-grid{ display:flex; flex-wrap:wrap; gap:12px; margin-bottom:18px; }
.resource-btn{ height:46px; border:none; background:#f3f4f6; color:#374151; padding:0 18px; border-radius:14px; font-size:13px; font-weight:700; cursor:pointer; transition:.2s ease; }
.resource-btn:hover{ background:rgba(79,107,82,.1); color:var(--accent); }
/* Teacher controls strip */
.teacher-controls{ display:flex; flex-wrap:wrap; gap:10px; padding-top:18px; border-top:1px dashed rgba(79,107,82,.15); }
.teacher-btn{ height:40px; border:1.5px solid rgba(79,107,82,.22); background:transparent; color:var(--accent); padding:0 16px; border-radius:12px; font-size:12px; font-weight:700; cursor:pointer; transition:.2s ease; display:flex; align-items:center; gap:8px; }
.teacher-btn:hover{ background:rgba(79,107,82,.08); border-color:var(--accent); }
.teacher-btn svg{ width:14px; height:14px; }
.teacher-btn.danger{ border-color:rgba(194,65,65,.25); color:var(--red); }
.teacher-btn.danger:hover{ background:#fbe9e7; border-color:var(--red); }
.btn-go-live{ height:40px; border:none; background:linear-gradient(135deg,#4f6b52,#7f9679); color:white; padding:0 18px; border-radius:12px; font-size:12px; font-weight:800; letter-spacing:.03em; cursor:pointer; transition:.2s ease; display:flex; align-items:center; gap:8px; box-shadow:0 10px 22px rgba(79,107,82,.22); white-space:nowrap; }
.btn-go-live svg{ width:14px; height:14px; flex-shrink:0; }
.btn-go-live:hover{ filter:brightness(1.06); transform:translateY(-1px); }
.btn-go-live.ending{ background:linear-gradient(135deg,#8a4646,#a86a6a); box-shadow:0 10px 22px rgba(138,70,70,.22); }
/* Grading rows */
.assignment-list{ display:flex; flex-direction:column; gap:14px; }
.assignment-row{ background:white; border-radius:22px; padding:20px 22px; border:1px solid rgba(17,24,39,.04); display:flex; justify-content:space-between; align-items:center; gap:20px; }
.assignment-left{ display:flex; align-items:center; gap:16px; }
.assignment-icon{ width:52px; height:52px; border-radius:16px; background:#f3f4f6; display:grid; place-items:center; font-size:13px; font-weight:800; color:#374151; }
.assignment-title{ font-size:17px; font-weight:700; margin-bottom:4px; }
.assignment-sub{ font-size:14px; color:var(--sub); }
.assignment-actions{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.assignment-btn{ height:46px; border:none; background:var(--accent); color:white; padding:0 18px; border-radius:14px; font-size:13px; font-weight:700; cursor:pointer; }
.assignment-btn.outline{ background:transparent; border:1.5px solid rgba(79,107,82,.3); color:var(--accent); }
.assignment-btn.outline:hover{ background:rgba(79,107,82,.08); }
/* Stats overview strip */
.course-stats-strip{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat-mini{ background:white; border-radius:18px; padding:18px 20px; border:1px solid rgba(17,24,39,.05); }
.stat-mini-val{ font-size:28px; font-weight:800; letter-spacing:-.04em; margin-bottom:4px; }
.stat-mini-label{ font-size:13px; color:var(--sub); }
@media(max-width:1100px){ .content-grid{ grid-template-columns:1fr; } .sidebar{ position:relative; top:0; } .course-title{ font-size:42px; } .hero-top{ flex-direction:column; } .course-stats-strip{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:768px){ .page{ padding:0 14px 30px; } .hero{ padding:28px; border-radius:30px; } .course-title{ font-size:36px; } .surface{ padding:22px; border-radius:26px; } .content-top{ flex-direction:column; } .assignment-row{ flex-direction:column; align-items:flex-start; } .course-stats-strip{ grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>

<!-- Standalone nav (hidden when embedded in teacher-dashboard) -->
<header class="navbar" id="standaloneNav">
  <div class="nav-inner">
    <div class="brand">
      <div class="logo"><img src="assets/logo-white.svg" alt="Meridian"></div>
      <div class="brand-text">
        <div class="brand-title">Meridian</div>
        <div class="brand-sub">Teacher Portal</div>
      </div>
    </div>
    <nav class="nav-links">
      <button class="nav-btn" onclick="window.location.href='teacher.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
        Dashboard
      </button>
      <button class="nav-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        My Courses
      </button>
    </nav>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile nav drawer (standalone only) -->
<div class="mobile-menu" id="mobileMenu">
  <button class="nav-btn" onclick="window.location.href='teacher.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
    Dashboard
  </button>
  <button class="nav-btn active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    My Courses
  </button>
</div>

<div id="course-root"></div>

<script>
/* ================================================================
   COURSE DATA (teacher perspective)
   ================================================================ */
/* ================================================================
   COURSE DATA — fetched from IndexedDB (synced from Supabase)
   No hardcoded courses/lectures/assignments.
   Uses dynamic import() since this script may be re-injected as a
   plain (non-module) script by teacher.html's embedding logic.
   ================================================================ */
let _getById, _getLecturesByCourse, _getAssignmentsByCourse;
let _upsertLecture, _deleteLecture, _upsertAssignment, _deleteAssignment, _uploadFile, _syncFromSupabase;

async function loadDeps() {
  if (_getById) return; // already loaded
  const dbMod = await import("./JS/db.js");
  const supaMod = await import("./JS/supabase.js");
  _getById = dbMod.getById;
  _getLecturesByCourse = dbMod.getLecturesByCourse;
  _getAssignmentsByCourse = dbMod.getAssignmentsByCourse;
  _upsertLecture = supaMod.upsertLecture;
  _deleteLecture = supaMod.deleteLecture;
  _upsertAssignment = supaMod.upsertAssignment;
  _deleteAssignment = supaMod.deleteAssignment;
  _uploadFile = supaMod.uploadFile;
  _syncFromSupabase = supaMod.syncFromSupabase;
}

function teacherControlsHTML(lecture) {
  const todayISO = new Date().toISOString().slice(0, 10);
  const isScheduledToday = lecture.scheduledFor === todayISO;
  const showLiveToggle = lecture.live || isScheduledToday;
  const liveToggleBtn = showLiveToggle ? `
      <button class="btn-go-live ${lecture.live ? 'ending' : ''} btn-toggle-live" data-id="${lecture.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        ${lecture.live ? "End Lecture" : "Go Live"}
      </button>` : "";
  return `
    <div class="teacher-controls">
      <button class="teacher-btn btn-edit-lecture" data-id="${lecture.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Lecture
      </button>
      <button class="teacher-btn btn-upload-notes" data-id="${lecture.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Notes
      </button>
      <button class="teacher-btn btn-upload-recording" data-id="${lecture.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
        Upload Recording
      </button>
      <button class="teacher-btn btn-create-assignment" data-id="${lecture.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        Create Assignment
      </button>
      ${liveToggleBtn}
      <button class="teacher-btn danger btn-delete-lecture" data-id="${lecture.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Delete
      </button>
    </div>`;
}

function renderHTML(course, lectures, assignments, from, to) {
  const isOnline = course.mode === "online";
  const heroStyle = `background:linear-gradient(135deg,${from} 0%,${to} 100%)`;
  const currentWeek = lectures.length ? Math.max(...lectures.map(l => l.weekNumber || 0)) : 0;

  const statsHTML = `
    <div class="course-stats-strip">
      <div class="stat-mini"><div class="stat-mini-val">—</div><div class="stat-mini-label">Enrolled Students</div></div>
      <div class="stat-mini"><div class="stat-mini-val">${lectures.length}</div><div class="stat-mini-label">Weeks Covered</div></div>
      <div class="stat-mini"><div class="stat-mini-val">${assignments.length}</div><div class="stat-mini-label">Assessments</div></div>
      <div class="stat-mini"><div class="stat-mini-val">W${currentWeek}</div><div class="stat-mini-label">Current Week</div></div>
    </div>`;

  const weeksHTML = lectures.slice().sort((a,b) => (b.weekNumber||0)-(a.weekNumber||0)).map(function(w) {
    const isLive = !!w.live;
    const statusEl = isLive
      ? `<div style="display:flex;gap:10px;flex-wrap:wrap;"><div class="live-pill">LIVE TODAY</div><div class="content-status">${w.date||""}</div></div>`
      : `<div class="content-status">${w.date||""}</div>`;
    const resBtns = (w.resources || []).map(r => `<button class="resource-btn">${r}</button>`).join("");
    return `
      <div class="content-row" data-lecture-id="${w.id}">
        <div class="content-top">
          <div class="content-left">
            <div class="week-badge">W${w.weekNumber}</div>
            <div>
              <div class="content-title">${w.title || "Untitled"}</div>
              <div class="content-sub">${w.description || ""}</div>
            </div>
          </div>
          ${statusEl}
        </div>
        <div class="resource-grid">${resBtns}</div>
        ${teacherControlsHTML(w)}
      </div>`;
  }).join("") || `<div style="padding:30px;text-align:center;color:var(--sub);">No lectures yet. Click "+ Add Lecture" to create one.</div>`;

  const assessHTML = assignments.map(function(a) {
    return `
      <div class="assignment-row" data-assignment-id="${a.id}">
        <div class="assignment-left">
          <div class="assignment-icon">${a.type}</div>
          <div>
            <div class="assignment-title">${a.title}</div>
            <div class="assignment-sub">${a.due || ""}</div>
          </div>
        </div>
        <div class="assignment-actions">
          <button class="assignment-btn outline btn-delete-assignment" data-id="${a.id}">Delete</button>
          <button class="assignment-btn btn-edit-assignment" data-id="${a.id}">Edit</button>
        </div>
      </div>`;
  }).join("") || `<div style="padding:20px;text-align:center;color:var(--sub);">No assignments yet.</div>`;

  document.getElementById("course-root").innerHTML = `
    <div class="page">
      <div class="hero" style="${heroStyle}">
        <div class="hero-top">
          <div class="hero-left">
            <div class="course-title">${course.code}<br>${course.title}</div>
            <div class="course-meta">
              ${course.semester || ""} &bull; ${course.schedule || ""}<br>
              ${course.lecturer || "TBA"} &nbsp;&middot;&nbsp; ${isOnline ? "Online" : (course.mode||"").charAt(0).toUpperCase()+(course.mode||"").slice(1)}
            </div>
          </div>
          <div class="hero-actions">
            <button class="hero-btn primary" style="position:relative;" id="btn-manage-assignments">
              Manage Assignments
              <span style="position:absolute;top:-8px;right:-8px;background:#c24141;color:white;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid white;">${assignments.length}</span>
            </button>
            <button class="hero-btn secondary" id="btn-post-announcement">Post Announcement</button>
            <button class="hero-btn secondary" id="btn-add-week">Add Week</button>
          </div>
        </div>

/* ================================================================
   ACTION WIRING — buttons that actually do something
   ================================================================ */
function nextWeekNumber(lectures) {
  return lectures.length ? Math.max(...lectures.map(l => l.weekNumber || 0)) + 1 : 1;
}

function pickFile(accept) {
  return new Promise(resolve => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = accept;
    input.onchange = () => resolve(input.files[0] || null);
    input.click();
  });
}

async function rerender(courseId, from, to) {
  await _syncFromSupabase().catch(()=>{});
  const course = await _getById("courses", courseId);
  const lectures = await _getLecturesByCourse(courseId);
  const assignments = await _getAssignmentsByCourse(courseId);
  renderHTML(course, lectures, assignments, from, to);
}

function formatDateHuman(d) {
  return d.toLocaleDateString(undefined, { day: "numeric", month: "long", year: "numeric" });
}

// Minimal native date-picker prompt — avoids freeform date typing entirely.
function pickDate(defaultISO) {
  return new Promise((resolve) => {
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9999;";
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:24px;display:flex;flex-direction:column;gap:14px;min-width:260px;">
        <div style="font-weight:700;font-size:15px;">Schedule lecture for</div>
        <input type="date" id="schedulePickerInput" value="${defaultISO}" style="height:40px;border:1.5px solid rgba(79,107,82,.22);border-radius:10px;padding:0 10px;font-size:14px;">
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button id="schedulePickerCancel" style="height:36px;padding:0 14px;border-radius:10px;border:1.5px solid rgba(79,107,82,.22);background:none;cursor:pointer;">Cancel</button>
          <button id="schedulePickerConfirm" style="height:36px;padding:0 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:700;">Schedule</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const input = overlay.querySelector("#schedulePickerInput");
    overlay.querySelector("#schedulePickerCancel").onclick = () => { overlay.remove(); resolve(null); };
    overlay.querySelector("#schedulePickerConfirm").onclick = () => { const v = input.value; overlay.remove(); resolve(v || null); };
  });
}

function wireActions(courseId, lectures, assignments) {
  const from = sessionStorage.getItem("activeCourseFrom") || "#4f6b52";
  const to = sessionStorage.getItem("activeCourseTo") || "#7f9679";

  const startClassBtn = document.getElementById("btn-start-class");
  if (startClassBtn) startClassBtn.addEventListener("click", async () => {
    const title = prompt("Lecture title:");
    if (!title) return;
    const description = prompt("Short description:") || "";
    const weekNumber = nextWeekNumber(lectures);
    const today = new Date();
    const id = `${courseId}_W${weekNumber}`;
    startClassBtn.textContent = "Starting...";
    try {
      const otherLive = lectures.find(l => l.live);
      if (otherLive) await _upsertLecture({ ...otherLive, live: false });

      await _upsertLecture({
        id, courseId, weekNumber, title, description,
        date: formatDateHuman(today), scheduledFor: today.toISOString().slice(0, 10),
        live: false, resources: []
      });
      const { startLecture } = await import("./JS/livekit.js");
      const session = window._meridianSession;
      await startLecture(id, session.uid, session.displayName || "Teacher");
      await _upsertLecture({
        id, courseId, weekNumber, title, description,
        date: formatDateHuman(today), scheduledFor: today.toISOString().slice(0, 10),
        live: true, resources: []
      });
      window.location.href = `live.html?lectureId=${encodeURIComponent(id)}&role=teacher`;
    } catch (e) {
      alert("Failed to start class: " + e.message);
      startClassBtn.textContent = "Start Class Now";
    }
  });

  const scheduleLectureBtn = document.getElementById("btn-schedule-lecture");
  if (scheduleLectureBtn) scheduleLectureBtn.addEventListener("click", async () => {
    const title = prompt("Lecture title:");
    if (!title) return;
    const description = prompt("Short description:") || "";
    const weekNumber = nextWeekNumber(lectures);
    const defaultISO = new Date().toISOString().slice(0, 10);
    const iso = await pickDate(defaultISO);
    if (!iso) return;
    const id = `${courseId}_W${weekNumber}`;
    try {
      await _upsertLecture({
        id, courseId, weekNumber, title, description,
        date: formatDateHuman(new Date(iso + "T00:00:00")), scheduledFor: iso,
        live: false, resources: []
      });
      await rerender(courseId, from, to);
    } catch (e) { alert("Failed to schedule lecture: " + e.message); }
  });

  const addAssignmentBtn = document.getElementById("btn-add-assignment");
  if (addAssignmentBtn) addAssignmentBtn.addEventListener("click", async () => {
    const type = prompt("Type (HW / CAT / Quiz):");
    if (!type) return;
    const title = prompt("Assignment title:");
    if (!title) return;
    const due = prompt("Due (e.g. Due Sunday - 11:59 PM):") || "";
    const id = `${courseId}_${type.toUpperCase()}_${Date.now()}`;
    try {
      await _upsertAssignment({ id, courseId, type, title, due });
      await rerender(courseId, from, to);
    } catch (e) { alert("Failed to add assignment: " + e.message); }
  });

  document.querySelectorAll(".btn-edit-lecture").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    const lecture = lectures.find(l => l.id === id);
    if (!lecture) return;
    const title = prompt("Title:", lecture.title) ?? lecture.title;
    const description = prompt("Description:", lecture.description) ?? lecture.description;
    const date = prompt("Date:", lecture.date) ?? lecture.date;
    try {
      await _upsertLecture({ ...lecture, title, description, date });
      await rerender(courseId, from, to);
    } catch (e) { alert("Failed to update lecture: " + e.message); }
  }));

  document.querySelectorAll(".btn-delete-lecture").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    if (!confirm("Delete this lecture? This cannot be undone.")) return;
    try {
      await _deleteLecture(id);
      await rerender(courseId, from, to);
    } catch (e) { alert("Failed to delete lecture: " + e.message); }
  }));

  document.querySelectorAll(".btn-toggle-live").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    const lecture = lectures.find(l => l.id === id);
    if (!lecture) return;

    if (!lecture.live) {
      // Going live: end any other lecture in this course still flagged
      // live (shouldn't normally happen, but stops two rooms from being
      // "the" live one at once and confusing students), then start this one.
      btn.textContent = "Starting...";
      try {
        const otherLive = lectures.find(l => l.id !== id && l.live);
        if (otherLive) await _upsertLecture({ ...otherLive, live: false });

        const { startLecture } = await import("./JS/livekit.js");
        const session = window._meridianSession;
        await startLecture(lecture.id, session.uid, session.displayName || "Teacher");
        await _upsertLecture({ ...lecture, live: true });
        await rerender(courseId, from, to);
        window.location.href = `live.html?lectureId=${encodeURIComponent(lecture.id)}&role=teacher`;
      } catch (e) {
        alert("Failed to start live lecture: " + e.message);
        btn.textContent = "Go Live";
      }
    } else {
      // Ending live: just clear the flag — the room ends naturally when
      // everyone leaves, and Egress finishes/uploads the recording then.
      try {
        await _upsertLecture({ ...lecture, live: false });
        await rerender(courseId, from, to);
      } catch (e) { alert("Failed to update: " + e.message); }
    }
  }));

  document.querySelectorAll(".btn-upload-notes").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    const lecture = lectures.find(l => l.id === id);
    if (!lecture) return;
    const file = await pickFile(".pdf,application/pdf");
    if (!file) return;
    btn.textContent = "Uploading...";
    try {
      const url = await _uploadFile(file, courseId, lecture.weekNumber, "notes");
      await _upsertLecture({ ...lecture, notesUrl: url, resources: [...new Set([...(lecture.resources||[]), "Lecture Notes"])] });
      await rerender(courseId, from, to);
    } catch (e) { alert("Upload failed: " + e.message); btn.textContent = "Upload Notes"; }
  }));

  document.querySelectorAll(".btn-upload-recording").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    const lecture = lectures.find(l => l.id === id);
    if (!lecture) return;
    const file = await pickFile("video/mp4,video/*");
    if (!file) return;
    btn.textContent = "Uploading...";
    try {
      const url = await _uploadFile(file, courseId, lecture.weekNumber, "video");
      await _upsertLecture({ ...lecture, videoUrl: url, resources: [...new Set([...(lecture.resources||[]), "Lecture Recording"])] });
      await rerender(courseId, from, to);
    } catch (e) { alert("Upload failed: " + e.message); btn.textContent = "Upload Recording"; }
  }));

  document.querySelectorAll(".btn-create-assignment").forEach(btn => btn.addEventListener("click", async () => {
    const lectureId = btn.dataset.id;
    const lecture = lectures.find(l => l.id === lectureId);
    if (!lecture) return;
    const type = prompt("Type (HW / CAT / Quiz):");
    if (!type) return;
    const title = prompt("Title:");
    if (!title) return;
    const due = prompt("Due:") || "";
    const id = `${courseId}_${type.toUpperCase()}_${Date.now()}`;
    try {
      await _upsertAssignment({ id, courseId, type, title, due });
      await _upsertLecture({ ...lecture, resources: [...new Set([...(lecture.resources||[]), type])] });
      await rerender(courseId, from, to);
    } catch (e) { alert("Failed: " + e.message); }
  }));

  document.querySelectorAll(".btn-edit-assignment").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    const a = assignments.find(x => x.id === id);
    if (!a) return;
    const title = prompt("Title:", a.title) ?? a.title;
    const due = prompt("Due:", a.due) ?? a.due;
    try {
      await _upsertAssignment({ ...a, title, due });
      await rerender(courseId, from, to);
    } catch (e) { alert("Failed: " + e.message); }
  }));

  document.querySelectorAll(".btn-delete-assignment").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    if (!confirm("Delete this assignment?")) return;
    try {
      await _deleteAssignment(id);
      await rerender(courseId, from, to);
    } catch (e) { alert("Failed: " + e.message); }
  }));

  const addWeekBtn = document.getElementById("btn-add-week");
  if (addWeekBtn) addWeekBtn.addEventListener("click", () => addLectureBtn && addLectureBtn.click());

  const announceBtn = document.getElementById("btn-post-announcement");
  if (announceBtn) announceBtn.addEventListener("click", async () => {
    const title = prompt("Announcement title:");
    if (!title) return;
    const body = prompt("Announcement body:") || "";
    const id = `${courseId}_ANN_${Date.now()}`;
    try {
      const res = await fetch(`https://fzkpmptsnnkafaaeqhnf.supabase.co/rest/v1/announcements`, {
        method: "POST",
        headers: {
          "apikey": "sb_publishable_Sw15oAmzk8DDUiwOe8mU8A_g-ZHg5EO",
          "Authorization": "Bearer sb_publishable_Sw15oAmzk8DDUiwOe8mU8A_g-ZHg5EO",
          "Content-Type": "application/json",
          "Prefer": "return=representation"
        },
        body: JSON.stringify({ id, course_id: courseId, title, body })
      });
      if (!res.ok) throw new Error(await res.text());
      alert("Announcement posted.");
    } catch (e) { alert("Failed to post: " + e.message); }
  });
}

let _unsubscribeRealtime = null;

async function render(code, from, to) {
  await loadDeps();
  const course = await _getById("courses", code);
  if (!course) {
    document.getElementById("course-root").innerHTML =
      "<div style='padding:60px;text-align:center;color:#6b7280;'>Course not found: " + code + "</div>";
    return;
  }
  const lectures = await _getLecturesByCourse(code);
  const assignments = await _getAssignmentsByCourse(code);
  renderHTML(course, lectures, assignments, from || "#4f6b52", to || "#7f9679");

  // ── Realtime: pick up edits from another tab/session without reloading ──
  if (_unsubscribeRealtime) { _unsubscribeRealtime(); _unsubscribeRealtime = null; }
  import("./JS/supabase.js").then(({ subscribeToTable, syncFromSupabase }) => {
    const refresh = async () => {
      await syncFromSupabase().catch(() => {});
      render(code, from, to);
    };
    Promise.all([
      subscribeToTable("lectures", refresh),
      subscribeToTable("assignments", refresh)
    ]).then(unsubs => {
      _unsubscribeRealtime = () => unsubs.forEach(u => u());
    }).catch(err => console.warn("[teacher_course] Realtime subscription failed:", err));
  });
}
