<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Course | Meridian Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="manifest" href="/manifest.json">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
:root{
  --surface:rgba(255,255,255,.72); --border:rgba(17,24,39,.06);
  --text:#111827; --sub:#6b7280; --accent:#4f6b52;
  --shadow:0 10px 30px rgba(15,23,42,.05);
}
body{ font-family:"Inter",sans-serif; background:radial-gradient(circle at top left,#ebe5db 0%,transparent 26%),linear-gradient(to bottom,#faf9f7 0%,#f3f1eb 100%); color:var(--text); min-height:100vh; overflow-x:hidden; }
.navbar{ position:sticky; top:0; z-index:100; backdrop-filter:blur(18px); background:rgba(250,249,247,.82); border-bottom:1px solid var(--border); }
.nav-inner{ max-width:1400px; margin:auto; height:82px; padding:0 36px; display:flex; align-items:center; justify-content:space-between; gap:32px; }
.brand{ display:flex; align-items:center; gap:14px; flex-shrink:0; }
.logo{ width:46px; height:46px; border-radius:16px;  display:grid; place-items:center; color:white; font-weight:700; font-size:15px; }
.logo img{ width:25px; height:auto; object-fit:contain;   }
.brand-text{ display:flex; flex-direction:column; }
.brand-title{ font-size:15px; font-weight:700; letter-spacing:-.02em; }
.brand-sub{ font-size:12px; color:var(--sub); }
.nav-links{ display:flex; align-items:center; gap:12px; flex:1; justify-content:center; }
.nav-btn{ border:none; background:transparent; height:46px; padding:0 18px; border-radius:14px; display:flex; align-items:center; gap:10px; color:var(--sub); font-size:14px; font-weight:500; cursor:pointer; transition:.2s ease; }
.nav-btn svg{ width:18px; height:18px; }
.nav-btn:hover,.nav-btn.active{ background:#e8efe8; color:#4f6b52; }
@media(max-width:950px){ .nav-links{ display:none; } }
.page{ width:100%; max-width:1450px; margin:auto; padding:32px 28px 40px; }
.hero{ position:relative; overflow:hidden; background:linear-gradient(135deg,rgba(91,113,91,.96),rgba(129,149,126,.9)); border-radius:38px; padding:38px; color:white; margin-bottom:28px; box-shadow:0 25px 70px rgba(79,107,82,.14); }
.hero::before{ content:""; position:absolute; width:360px; height:360px; border-radius:50%; background:rgba(255,255,255,.06); top:-180px; right:-120px; }
.hero-top{ display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; }
.hero-left{ max-width:700px; }
.course-title{ font-size:54px; line-height:.95; font-weight:800; letter-spacing:-.06em; margin-bottom:18px; }
.course-meta{ color:rgba(255,255,255,.82); font-size:15px; line-height:1.8; }
.hero-actions{ display:flex; align-items:flex-end; gap:14px; }
.hero-btn{ height:54px; border:none; padding:0 24px; border-radius:18px; font-size:14px; font-weight:700; cursor:pointer; transition:.2s ease; position:relative; }
.hero-btn.primary{ background:white; color:var(--accent); }
.hero-btn.secondary{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); color:white; }
.content-grid{ display:grid; grid-template-columns:290px 1fr; gap:24px; }
.sidebar{ position:sticky; top:100px; height:fit-content; background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:30px; padding:20px; box-shadow:var(--shadow); }
.side-title{ font-size:12px; font-weight:700; letter-spacing:.14em; color:#9ca3af; margin-bottom:18px; }
.side-item{ height:54px; display:flex; align-items:center; padding:0 18px; border-radius:16px; cursor:pointer; margin-bottom:10px; font-size:14px; font-weight:600; color:#4b5563; transition:.2s ease; }
.side-item:hover{ background:rgba(79,107,82,.06); }
.side-item.active{ background:var(--accent); color:white; }
.side-new-pill{ position:relative; display:inline-flex; align-items:center; background:#e8f5e9; color:#2e7d32; font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px; letter-spacing:.04em; margin-left:auto; }
.side-new-pill .side-new-count{ position:absolute; top:-7px; left:-7px; background:#c24141; color:#fff; font-size:10px; font-weight:800; min-width:18px; height:18px; border-radius:999px; display:flex; align-items:center; justify-content:center; padding:0 4px; border:2px solid white; box-shadow:0 2px 6px rgba(194,65,65,.35); }
.main{ display:flex; flex-direction:column; gap:24px; }
.surface{ background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:32px; padding:28px; box-shadow:var(--shadow); }
.section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.section-title{ font-size:28px; font-weight:800; letter-spacing:-.05em; }
.section-link{ color:var(--accent); text-decoration:none; font-size:14px; font-weight:700; }
.content-scroll{ overflow-y:visible; padding-right:6px; }
.content-scroll::-webkit-scrollbar{ width:8px; }
.content-scroll::-webkit-scrollbar-thumb{ background:rgba(79,107,82,.22); border-radius:20px; }
.content-list{ display:flex; flex-direction:column; gap:16px; }
.content-row{ background:white; border-radius:24px; border:1px solid rgba(17,24,39,.05); padding:22px; transition:.2s ease; position:relative; }
.content-row--live{ border:2px solid #4f6b52; box-shadow:0 0 0 4px rgba(79,107,82,.12); }
.live-now-dot{ width:7px; height:7px; border-radius:50%; background:#fff; animation:liveDotPulse 1.4s infinite; }
@keyframes liveDotPulse{ 0%{ transform:scale(1); box-shadow:0 0 0 0 rgba(255,255,255,.5); } 70%{ transform:scale(1.15); box-shadow:0 0 0 6px rgba(255,255,255,0); } 100%{ transform:scale(1); box-shadow:0 0 0 0 rgba(255,255,255,0); } }
.content-row:hover{ box-shadow:0 8px 20px rgba(15,23,42,.08); border-color:rgba(17,24,39,.1); }
.content-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:18px; }
.content-left{ display:flex; gap:16px; }
.week-badge{ min-width:58px; height:58px; border-radius:18px; background:rgba(79,107,82,.08); color:var(--accent); display:grid; place-items:center; font-size:13px; font-weight:800; }
.content-title{ font-size:20px; font-weight:700; margin-bottom:6px; }
.content-sub{ font-size:14px; color:var(--sub); line-height:1.7; }
.content-status{ background:#f3f4f6; color:#374151; padding:10px 14px; border-radius:12px; font-size:12px; font-weight:800; letter-spacing:.05em; white-space:nowrap; }
.live-pill{ background:linear-gradient(135deg,#4f6b52,#7f9679); color:white; padding:10px 16px; border-radius:14px; font-size:12px; font-weight:800; letter-spacing:.05em; box-shadow:0 10px 22px rgba(79,107,82,.18); white-space:nowrap; cursor:pointer; display:flex; align-items:center; gap:7px; }
.resource-grid{ display:flex; flex-wrap:wrap; gap:12px; }
.resource-btn{ height:46px; border:none; background:#f3f4f6; color:#374151; padding:0 18px; border-radius:14px; font-size:13px; font-weight:700; cursor:pointer; transition:.2s ease; }
.resource-btn:hover{ background:rgba(79,107,82,.1); color:var(--accent); }
.assignment-list{ display:flex; flex-direction:column; gap:14px; }
.assignment-row{ background:white; border-radius:22px; padding:20px 22px; border:1px solid rgba(17,24,39,.04); display:flex; justify-content:space-between; align-items:center; gap:20px; }
.assignment-left{ display:flex; align-items:center; gap:16px; }
.assignment-icon{ width:52px; height:52px; border-radius:16px; background:#f3f4f6; display:grid; place-items:center; font-size:13px; font-weight:800; color:#374151; }
.assignment-title{ font-size:17px; font-weight:700; margin-bottom:4px; }
.assignment-sub{ font-size:14px; color:var(--sub); }
.assignment-btn{ height:46px; border:none; background:var(--accent); color:white; padding:0 18px; border-radius:14px; font-size:13px; font-weight:700; cursor:pointer; }
@media(max-width:1100px){ .content-grid{ grid-template-columns:1fr; } .course-title{ font-size:42px; } .hero-top{ flex-direction:column; gap:16px; } .hero-actions{ align-items:flex-start; } }
@media(max-width:768px){
  .page{ padding:0 0 30px; }
  .hero{ padding:22px 16px; border-radius:20px; margin:12px 12px 16px; }
  .hero::before{ display:none; }
  .course-title{ font-size:26px; letter-spacing:-.03em; line-height:1.1; }
  .course-meta{ font-size:13px; }
  .hero-btn{ height:44px; padding:0 18px; font-size:13px; border-radius:14px; }
  .surface{ padding:16px 14px; border-radius:20px; margin:0 12px; }
  .section-title{ font-size:20px; }
  /* Sidebar → horizontal scrollable pill bar */
  .sidebar{
    position:relative; top:0;
    display:flex; flex-direction:row; gap:6px;
    padding:10px 12px; border-radius:0; border-left:none; border-right:none;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none; background:rgba(255,255,255,.9);
    backdrop-filter:blur(12px); border-top:1px solid var(--border);
    border-bottom:1px solid var(--border); margin-bottom:12px;
    box-shadow:none;
  }
  .sidebar::-webkit-scrollbar{ display:none; }
  .side-title{ display:none; }
  .side-item{
    flex-shrink:0; height:36px; padding:0 16px; border-radius:999px;
    margin-bottom:0; font-size:13px; font-weight:600; white-space:nowrap;
  }
  .side-item.active{ background:var(--accent); color:white; }
  .content-grid{ gap:0; }
  .main{ padding:0 12px; gap:16px; }
  /* Content rows */
  .content-top{ flex-direction:column; gap:10px; }
  .content-title{ font-size:16px; }
  .content-sub{ font-size:13px; }
  .content-status{ font-size:11px; align-self:flex-start; }
  .live-pill{ align-self:flex-start; }
  .week-badge{ min-width:46px; height:46px; font-size:11px; border-radius:14px; }
  .content-row{ border-radius:18px; padding:16px 14px; }
  .resource-btn{ height:38px; font-size:12px; padding:0 14px; }
  /* Assignments */
  .assignment-row{ flex-direction:column; align-items:flex-start; gap:10px; border-radius:18px; padding:16px 14px; }
  .assignment-btn{ width:100%; height:42px; text-align:center; border-radius:12px; }
  .assignment-icon{ width:44px; height:44px; border-radius:12px; }
  .assignment-title{ font-size:15px; }
  .nav-inner{ padding:0 16px; }
}
</style>

  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">

<body>

<!-- Shown only when course.html opened standalone (not embedded in dashboard) -->
<header class="navbar" id="standaloneNav">
  <div class="nav-inner">
    <div class="brand">
      <div class="logo"><img src="assets/logo.svg" alt="Meridian"></div>
      <div class="brand-text">
        <div class="brand-title">Meridian</div>
        <div class="brand-sub">Student Learning Portal</div>
      </div>
    </div>
    <nav class="nav-links">
      <button class="nav-btn" onclick="window.location.href='index.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
        Dashboard
      </button>
      <button class="nav-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Courses
      </button>
    </nav>
  </div>
</header>

<!-- Dashboard injects into here; standalone renders directly into here too -->
<div id="course-root"></div>

<script>
/* ================================================================
   COURSE DATA — defaults
   To plug in Firebase: replace render(code) lookup with a
   Firestore getDoc() call, then pass the result to renderHTML().
   ================================================================ */
/* ================================================================
   COURSE DATA — fetched from IndexedDB (synced from Supabase)
   No hardcoded courses/lectures/assignments.
   Uses dynamic import() since this script may be re-injected as a
   plain (non-module) script by index.html's embedding logic.
   ================================================================ */
let _getById, _getLecturesByCourse, _getAssignmentsByCourse;

async function loadDeps() {
  if (_getById) return;
  const dbMod = await import("./JS/db.js");
  _getById = dbMod.getById;
  _getLecturesByCourse = dbMod.getLecturesByCourse;
  _getAssignmentsByCourse = dbMod.getAssignmentsByCourse;
}

/* ================================================================
   RENDERER
   ================================================================ */
function resourceBtns(mode, week) {
  const btns = [];
  if (week.resources) btns.push(...week.resources);
  return btns.map(b => "<button class=\"resource-btn\" onclick=\"event.stopPropagation()\">" + b + "</button>").join("");
}

let _unsubscribeRealtime = null;

async function fetchCourseAssessments(courseId) {
  try {
    const { getConfig } = await import('./JS/config.js');
    const sess = JSON.parse(localStorage.getItem('meridian_session')||'{}');
    let idToken = sess.idToken || '';
    try {
      const { getAuth } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      const u = getAuth().currentUser;
      if (u) idToken = await u.getIdToken();
    } catch {}
    const cfg = await getConfig(idToken).catch(()=>({supabaseKey:''}));
    const k = cfg.supabaseKey;
    const SURL = 'https://fzkpmptsnnkafaaeqhnf.supabase.co';
    const res = await fetch(`${SURL}/rest/v1/assessments?course_id=eq.${courseId}&status=in.(open,closed)&order=created_at.desc`, {
      headers: { apikey: k, Authorization: `Bearer ${k}` }
    });
    if (!res.ok) return [];
    return res.json();
  } catch { return []; }
}

async function fetchMyAttempts(courseId) {
  try {
    const { getConfig } = await import('./JS/config.js');
    const sess = JSON.parse(localStorage.getItem('meridian_session')||'{}');
    let idToken = sess.idToken || '';
    try {
      const { getAuth } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      const u = getAuth().currentUser;
      if (u) idToken = await u.getIdToken();
    } catch {}
    const cfg = await getConfig(idToken).catch(()=>({supabaseKey:''}));
    const k = cfg.supabaseKey;
    const SURL = 'https://fzkpmptsnnkafaaeqhnf.supabase.co';
    const uid = sess.uid || '';
    const res = await fetch(`${SURL}/rest/v1/attempts?student_id=eq.${uid}&status=eq.submitted`, {
      headers: { apikey: k, Authorization: `Bearer ${k}` }
    });
    if (!res.ok) return [];
    return res.json();
  } catch { return []; }
}

async function render(code, from, to) {
  await loadDeps();
  const c = await _getById("courses", code);
  if (!c) {
    document.getElementById("course-root").innerHTML =
      "<div style=\"padding:60px;text-align:center;color:#6b7280;\">Course not found: " + code + "</div>";
    return;
  }
  const lectures = await _getLecturesByCourse(code);
  const assignments = await _getAssignmentsByCourse(code);
  const assessments = await fetchCourseAssessments(code);
  const myAttempts = await fetchMyAttempts(code);
  renderHTML(c, lectures, assignments, assessments, myAttempts, from || "#4f6b52", to || "#7f9679");

  // ── Realtime: pick up teacher edits (new lectures, uploads, live status,
  // new assignments) without needing a reload. Re-subscribes each time a
  // different course is opened; drops the previous course's subscription.
  if (_unsubscribeRealtime) { _unsubscribeRealtime(); _unsubscribeRealtime = null; }
  import("./JS/supabase.js").then(({ subscribeToTable, syncFromSupabase }) => {
    const refresh = async () => {
      await syncFromSupabase().catch(() => {});
      render(code, from, to);
    };
    Promise.all([
      subscribeToTable("lectures", refresh),
      subscribeToTable("assignments", refresh)
    ]).then(unsubs => {
      _unsubscribeRealtime = () => unsubs.forEach(u => u());
    }).catch(err => console.warn("[course] Realtime subscription failed:", err));
  });
}

function renderHTML(c, lectures, assignments, assessments, myAttempts, from, to) {
  const isPhysical = c.mode === "physical";
  const modeLabel  = (c.mode||"").charAt(0).toUpperCase() + (c.mode||"").slice(1);
  const heroStyle  = "background:linear-gradient(135deg," + from + " 0%," + to + " 100%)";

  const sortedWeeks = lectures.slice().sort((a,b) => (b.weekNumber||0)-(a.weekNumber||0));

  const weeksHTML = sortedWeeks.map(function(w) {
    const statusEl = w.live
      ? "<div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:center;\"><div class=\"live-pill\" onclick=\"event.stopPropagation();window.location.href='live.html?lectureId=" + encodeURIComponent(w.id) + "&role=student&courseId=" + encodeURIComponent(c.id) + "'\"><span class=\"live-now-dot\"></span>JOIN LIVE LECTURE</div><div class=\"content-status\">" + (w.date||"") + "</div></div>"
      : "<div class=\"content-status\">" + (w.date||"") + "</div>";
    var _href = w.live
      ? 'live.html?lectureId=' + encodeURIComponent(w.id) + '&role=student&courseId=' + encodeURIComponent(c.id)
      : 'media.html?from=' + encodeURIComponent(c.id) + '&week=' + encodeURIComponent(w.weekNumber) + '&title=' + encodeURIComponent(w.title||"");
    var _liveClass = w.live ? " content-row--live" : "";
    return "<div class=\"content-row" + _liveClass + "\" style=\"cursor:pointer;\" onclick=\"window.location.href='" + _href + "'\"><div class=\"content-top\"><div class=\"content-left\"><div class=\"week-badge\">W" + w.weekNumber + "</div><div><div class=\"content-title\">" + (w.title||"Untitled") + "</div><div class=\"content-sub\">" + (w.description||"") + "</div></div></div>" + statusEl + "</div><div class=\"resource-grid\">" + resourceBtns(c.mode, w) + "</div></div>";
  }).join("") || "<div style=\"padding:30px;text-align:center;color:#6b7280;\">No lectures posted yet.</div>";

  // Build upcoming work from assessments (sorted by due_at, open first)
  var submittedIds = new Set((myAttempts||[]).map(function(a){ return a.assessment_id; }));
  var openAssessments = (assessments||[]).filter(function(a){ return a.status==='open'; });
  var openCount = openAssessments.length;
  var unattemptedCount = openAssessments.filter(function(a){ return !submittedIds.has(a.id); }).length;
  var catCount = openAssessments.filter(function(a){ return a.type==='CAT'||a.type==='Quiz'; }).length;
  var hwCount = openAssessments.filter(function(a){ return a.type==='HW'; }).length;

  function lateLabel(due) {
    if (!due) return '';
    var diff = Date.now() - new Date(due).getTime();
    if (diff<=0) return '';
    var mins=Math.floor(diff/60000);
    if (mins<60) return mins+'m overdue';
    var hrs=Math.floor(mins/60);
    if (hrs<24) return hrs+'h overdue';
    return Math.floor(hrs/24)+'d overdue';
  }
  function fmtDue(iso) {
    if (!iso) return '';
    var d=new Date(iso);
    return 'Due '+d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  }

  var assessHTML = (assessments||[]).length === 0
    ? "<div style=\"padding:20px;text-align:center;color:#6b7280;\">No assignments yet.</div>"
    : (assessments||[]).map(function(a) {
        var done = submittedIds.has(a.id);
        var late = lateLabel(a.due_at);
        var dueStr = fmtDue(a.due_at);
        var iconClass = a.type==='CAT'||a.type==='Quiz' ? 'cat' : 'hw';
        var iconColor = a.type==='CAT'||a.type==='Quiz' ? 'background:rgba(183,121,31,.12);color:#b7791f;' : 'background:rgba(79,107,82,.1);color:#4f6b52;';
        var statusBadge = done
          ? '<span style="background:#dcfce7;color:#15803d;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;">Done</span>'
          : late
            ? '<span style="background:#fee2e2;color:#b91c1c;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;">'+late+'</span>'
            : a.status==='closed'
              ? '<span style="background:#f3f4f6;color:#6b7280;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;">Closed</span>'
              : '';
        return "<div class=\"assignment-row\" style=\"cursor:pointer;\" onclick=\"window.location.href='assessment.html?courseId="+c.id+"&role=student'\">"+
          "<div class=\"assignment-left\">"+
          "<div class=\"assignment-icon\" style=\""+iconColor+"\">"+a.type+"</div>"+
          "<div><div class=\"assignment-title\">"+(a.title||'Untitled')+"</div>"+
          "<div class=\"assignment-sub\">"+(dueStr||a.type)+(a.duration_mins?' &bull; &#9201; '+a.duration_mins+'min':'')+"</div></div></div>"+
          "<div style=\"display:flex;align-items:center;gap:8px;\">"+statusBadge+
          "<button class=\"assignment-btn\" onclick=\"event.stopPropagation();window.location.href='attempt.html?assessmentId="+a.id+"'\">"+
          (done?'Review':(a.status==='open'?'Start':'View'))+"</button></div></div>";
      }).join('');

  document.getElementById("course-root").innerHTML =
    "<div class=\"page\">" +
    "<div class=\"hero\" style=\"" + heroStyle + "\"><div class=\"hero-top\"><div class=\"hero-left\"><div class=\"course-title\">" + c.title + "</div><div class=\"course-meta\">" + (c.semester||"") + " &bull; " + (c.schedule||"") + "<br>Lecturer: " + (c.lecturer||"TBA") + " &nbsp;&middot;&nbsp; " + modeLabel + "</div></div>" +
    "<div class=\"hero-actions\">" +
    "<button class=\"hero-btn primary\" style=\"position:relative;\" onclick=\"window.location.href='assessment.html?courseId="+c.id+"&role=student'\">View Assessments"+(openCount>0?"<span style=\"position:absolute;top:-8px;right:-8px;background:#c24141;color:white;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid white;box-shadow:0 2px 6px rgba(194,65,65,.4);\">" + openCount + "</span>":"")+"</button>" +
    "<button class=\"hero-btn secondary\" style=\"position:relative;\">Announcements</button>" +
    "</div></div></div>" +
    "<div class=\"content-grid\"><div class=\"sidebar\"><div class=\"side-title\">COURSE</div><div class=\"side-item active\">Overview</div><div class=\"side-item\">Lectures</div><div class=\"side-item\"><span>Assessments</span>"+(unattemptedCount>0?"<div class=\"side-new-pill\">"+(unattemptedCount>1?"<span class=\"side-new-count\">"+unattemptedCount+"</span>":"")+"NEW</div>":"")+"</div><div class=\"side-item\">Resources</div><div class=\"side-item\">Grades</div><div class=\"side-item\">Discussion</div></div>" +
    "<div class=\"main\"><div class=\"surface\"><div class=\"section-head\"><div class=\"section-title\">Course Content</div><a href=\"#\" class=\"section-link\">View All Weeks</a></div><div class=\"content-scroll\"><div class=\"content-list\">" + weeksHTML + "</div></div></div>" +
    "<div class=\"surface\" id=\"assessments-surface\"><div class=\"section-head\"><div class=\"section-title\">Upcoming Work"+"</div><a href=\"assessment.html?courseId="+c.id+"&role=student\" class=\"section-link\">View All</a></div><div class=\"assignment-list\">" + assessHTML + "</div></div></div></div></div>";

  document.querySelectorAll(".side-item").forEach(function(item) {
    item.addEventListener("click", function() {
      var label = item.textContent.trim();
      var courseCode = (c && c.id) ? c.id : (sessionStorage.getItem("activeCourse") || "");
      if (label === "Assessments" || label.startsWith("Assessments")) {
        window.location.href = "assessment.html?courseId=" + courseCode + "&role=student";
        return;
      }
      document.querySelectorAll(".side-item").forEach(function(el){ el.classList.remove("active"); });
      item.classList.add("active");
    });
  });

  // View Assessments button → scroll to assessments section
  var assessBtn = document.querySelector(".hero-btn.primary");
  if (assessBtn) {
    assessBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      var target = document.getElementById("assessments-surface");
      if (target) target.scrollIntoView({ behavior:"smooth", block:"start" });
    });
  }
}

/* ================================================================
   INIT
   window.initCourse(code) — called by dashboard after injecting
   #course-root into #page-course.
   Standalone — reads sessionStorage or defaults to DCS311.
   ================================================================ */
window.initCourse = function(code, from, to) {
  render(code, from, to);
};

// Standalone mode: read from URL or sessionStorage
// (When embedded in dashboard, initCourse is called directly instead)
if (!window._embeddedInDashboard && !window.frameElement) {
  const _urlCode = new URLSearchParams(window.location.search).get("code");
  const activeCode = _urlCode || sessionStorage.getItem("activeCourse") || "DCS311";
  const activeFrom = sessionStorage.getItem("activeCourseFrom") || "#4f6b52";
  const activeTo   = sessionStorage.getItem("activeCourseTo")   || "#7f9679";
  render(activeCode, activeFrom, activeTo);
}

// Hide standalone navbar when embedded in dashboard (iframe or fetched)
if (window._embeddedInDashboard || window.frameElement) {
  var nav = document.getElementById("standaloneNav");
  if (nav) nav.style.display = "none";
}
</script>
<!-- Session Guard -->
<script type="module">
import { requireSession } from "./JS/session.js";
const session = await requireSession();
// Role check - teachers go to teacher.html
if (session.role !== "student") { window.location.href = "teacher.html"; }
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(reg => console.log("SW registered:", reg.scope))
    .catch(err => console.warn("SW failed:", err));

  let _swRefreshed = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (_swRefreshed) return;
    _swRefreshed = true;
    window.location.reload();
  });
}
</script>
