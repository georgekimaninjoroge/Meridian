<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings | MDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
:root{
  --border:rgba(17,24,39,.07); --border2:rgba(17,24,39,.10);
  --text:#111827; --sub:#6b7280;
  --accent:#4f6b52; --accent-soft:#e8efe8;
  --green:#3f7a54; --red:#c24141;
  --shadow:0 10px 30px rgba(15,23,42,.05); --r:24px;
}
body{ font-family:'Inter',sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; background:transparent; }
body.standalone{ background:radial-gradient(circle at top left,#ece8df 0%,transparent 30%),linear-gradient(to bottom,#faf9f7 0%,#f3f1eb 100%); min-height:100vh; }

/* ── STANDALONE SHELL (no nav, just X + scroll) ── */
.standalone-shell{ display:none; }
body.standalone .standalone-shell{
  display:flex; flex-direction:column; min-height:100vh;
}
.standalone-topbar{
  display:flex; justify-content:flex-end; padding:20px 24px 0;
}
.close-x{
  width:36px; height:36px; border:none; border-radius:10px;
  background:rgba(17,24,39,.06); cursor:pointer;
  display:grid; place-items:center; transition:.2s ease; color:var(--sub);
}
.close-x:hover{ background:rgba(17,24,39,.12); color:var(--text); }
.close-x svg{ width:16px; height:16px; }

/* ── SCROLL CONTAINER ── */
.settings-scroll{
  overflow-y:auto;
  padding:28px 32px 48px;
}
body.standalone .settings-scroll{
  flex:1; padding:16px 32px 80px;
}
@media(max-width:560px){
  .settings-scroll{ padding:20px 16px 40px; }
  body.standalone .settings-scroll{ padding:12px 16px 60px; }
}

/* ── PAGE HEADER ── */

/* ── SECTION LABEL ── */
.section-label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--sub); margin-bottom:12px; }

/* ── CARD ── */
.card{ background:white; border-radius:var(--r); border:1px solid var(--border); box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
.card-body{ padding:24px; }
.card-title{ font-size:16px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
.card-desc{ font-size:13px; color:var(--sub); margin-bottom:16px; line-height:1.6; }

/* ── HINT ── */
.hint{ font-size:12px; color:var(--sub); margin-bottom:16px; line-height:1.5; padding:10px 14px; background:#f9f8f5; border-radius:12px; border:1px solid var(--border); }
.hint strong{ color:var(--text); font-weight:600; }

/* ── FORM GRID: 3 equal cols ── */
.field-row-3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field label{ font-size:12px; font-weight:600; color:#374151; }
.field-note{ font-size:11px; color:var(--sub); font-weight:400; }
.input{
  width:100%; height:48px;
  border:1.5px solid var(--border2); border-radius:14px;
  background:#f5f3ee; padding:0 16px;
  font-size:14px; font-family:'Inter',sans-serif;
  outline:none; transition:.25s ease; color:var(--text);
}
.input:focus{ background:white; border-color:rgba(79,107,82,.35); box-shadow:0 0 0 3px rgba(79,107,82,.08); }

/* ── BUTTONS ── */
.save-btn{
  height:46px; padding:0 24px; border:none; border-radius:12px;
  background:var(--accent); color:white;
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Inter',sans-serif; transition:.25s ease;
  display:flex; align-items:center; gap:8px;
}
.save-btn:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 8px 20px rgba(79,107,82,.22); }
.save-btn:disabled{ opacity:.55; cursor:not-allowed; transform:none; }
.ghost-btn{
  height:46px; padding:0 20px; border:1.5px solid var(--border2);
  border-radius:12px; background:white; color:var(--text);
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Inter',sans-serif; transition:.25s ease;
  display:flex; align-items:center; gap:8px;
}
.ghost-btn:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
.save-row{ display:flex; align-items:center; gap:12px; margin-top:16px; flex-wrap:wrap; }
.save-msg{ font-size:12px; font-weight:600; opacity:0; transition:opacity .3s ease; }
.save-msg.show{ opacity:1; }
.save-msg.success{ color:var(--green); }
.save-msg.error{ color:var(--red); }

/* ── STORAGE CARD ── */
.storage-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:16px; }
.storage-numbers{ display:flex; flex-direction:column; gap:2px; }
.storage-used{ font-size:28px; font-weight:700; letter-spacing:-.04em; }
.storage-total{ font-size:12px; color:var(--sub); }
.storage-level{ display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; }
.storage-level.ok{ background:var(--accent-soft); color:var(--accent); }
.storage-level.warn{ background:#fef3c7; color:#92400e; }
.storage-level.block{ background:#fbe9e7; color:var(--red); }
.storage-level-dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }
.bar-wrap{ height:8px; border-radius:999px; background:#ebe7df; overflow:hidden; margin-bottom:8px; }
.bar-fill{ height:100%; border-radius:999px; background:var(--accent); transition:width .6s cubic-bezier(.4,0,.2,1); }
.bar-fill.warn{ background:#f59e0b; }
.bar-fill.block{ background:var(--red); }
.bar-labels{ display:flex; justify-content:space-between; font-size:11px; color:var(--sub); margin-bottom:20px; }
.storage-breakdown{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.breakdown-item{ background:#f9f8f5; border-radius:14px; padding:14px 16px; }
.breakdown-label{ font-size:11px; color:var(--sub); font-weight:600; margin-bottom:3px; }
.breakdown-value{ font-size:15px; font-weight:700; letter-spacing:-.02em; }
.dump-btn{
  height:46px; padding:0 20px; border:1.5px solid #e5e0d8;
  border-radius:12px; background:white; color:var(--text);
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Inter',sans-serif; transition:.25s ease;
  display:flex; align-items:center; gap:8px;
}
.dump-btn:hover:not(:disabled){ border-color:var(--red); color:var(--red); background:#fbe9e7; }
.dump-btn:disabled{ opacity:.5; cursor:not-allowed; }
.dump-btn svg{ width:15px; height:15px; }
.dump-row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.dump-msg{ font-size:12px; font-weight:600; opacity:0; transition:opacity .3s ease; color:var(--green); }
.dump-msg.show{ opacity:1; }

/* ── SPINNER ── */
.spinner{ width:14px; height:14px; border:2px solid rgba(255,255,255,.35); border-top-color:white; border-radius:50%; animation:spin .7s linear infinite; display:none; }
.spinner.dark{ border-color:rgba(0,0,0,.1); border-top-color:var(--red); }
.loading .spinner{ display:block; }
.loading .btn-text{ display:none; }
@keyframes spin{ to{ transform:rotate(360deg); } }

@media(max-width:560px){
  .field-row-3{ grid-template-columns:1fr; }
  .storage-breakdown{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- Standalone wrapper: shown only on direct visit, has X close -->
<div class="standalone-shell" id="standaloneShell">
  <div class="standalone-topbar">
    <button class="close-x" onclick="history.back()" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<!-- Settings content: injected into modal OR appended to standaloneShell -->
<div class="settings-scroll" id="settingsScroll">

  <!-- ── PROFILE ── -->
  <div class="section-label">Profile</div>
  <div class="card">
    <div class="card-body">
      <div class="card-title">Display Name</div>
      <div class="card-desc">Set a preferred name. Only your first name appears in greetings — leave blank to use your account default.</div>

      <div class="hint" id="nameHint">
        Account name: <strong id="firebaseName">—</strong>
      </div>

      <div class="field-row-3">
        <div class="field">
          <label for="firstName">First Name <span class="field-note">(shown in greeting)</span></label>
          <input class="input" id="firstName" type="text" placeholder="e.g. John" autocomplete="given-name"/>
        </div>
        <div class="field">
          <label for="middleName">Middle Name <span class="field-note">(optional)</span></label>
          <input class="input" id="middleName" type="text" placeholder="e.g. Alexander" autocomplete="additional-name"/>
        </div>
        <div class="field">
          <label for="lastName">Last Name <span class="field-note">(optional)</span></label>
          <input class="input" id="lastName" type="text" placeholder="e.g. Smith" autocomplete="family-name"/>
        </div>
      </div>

      <div class="save-row">
        <button class="save-btn" id="saveNameBtn">
          <span class="spinner"></span>
          <span class="btn-text">Save Name</span>
        </button>
        <button class="ghost-btn" id="clearNameBtn">Use Account Default</button>
        <span class="save-msg" id="saveMsg"></span>
      </div>
    </div>
  </div>

  <!-- ── STORAGE ── -->
  <div class="section-label" style="margin-top:8px;">Storage</div>
  <div class="card">
    <div class="card-body">
      <div class="storage-top">
        <div class="storage-numbers">
          <div class="storage-used" id="storageUsed">—</div>
          <div class="storage-total" id="storageTotal">calculating…</div>
        </div>
        <div class="storage-level ok" id="storageLevel">
          <div class="storage-level-dot"></div>
          <span id="storageLevelText">Good</span>
        </div>
      </div>
      <div class="bar-wrap"><div class="bar-fill ok" id="storageBar" style="width:0%"></div></div>
      <div class="bar-labels">
        <span id="storageBarPct">0% used</span>
        <span id="storageBarFree">— free</span>
      </div>
      <div class="storage-breakdown">
        <div class="breakdown-item"><div class="breakdown-label">Used</div><div class="breakdown-value" id="breakdownUsed">—</div></div>
        <div class="breakdown-item"><div class="breakdown-label">Free</div><div class="breakdown-value" id="breakdownFree">—</div></div>
        <div class="breakdown-item"><div class="breakdown-label">Videos cached</div><div class="breakdown-value" id="breakdownVideos">—</div></div>
        <div class="breakdown-item"><div class="breakdown-label">PDFs cached</div><div class="breakdown-value" id="breakdownPdfs">—</div></div>
      </div>
      <div class="dump-row">
        <button class="dump-btn" id="dumpBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          <span class="spinner dark"></span>
          <span class="btn-text">Clear Offline Cache</span>
        </button>
        <span class="dump-msg" id="dumpMsg"></span>
      </div>
    </div>
  </div>

</div><!-- /settings-scroll -->

<script type="module">
let session;
if (window._settingsSession) {
  session = window._settingsSession;
} else {
  try {
    const mod = await import("./JS/session.js");
    session = await mod.requireSession();
  } catch {
    try {
      const mod = await import("./session.js");
      session = await mod.requireSession();
    } catch { session = {}; }
  }
}

// ── Embedded vs standalone ───────────────────────────────────────────────────
if (window._settingsEmbedded) {
  // modal mode: standalone shell stays hidden, scroll goes into modal body
} else {
  document.body.classList.add("standalone");
  // move settingsScroll inside standaloneShell so it scrolls together
  const shell = document.getElementById("standaloneShell");
  const scroll = document.getElementById("settingsScroll");
  shell.appendChild(scroll);
}

// ── Firebase name hint ───────────────────────────────────────────────────────
const firebaseDisplayName = session.displayName || session.portalId || "";
document.getElementById("firebaseName").textContent = firebaseDisplayName || "(not set)";

// ── Pre-fill ─────────────────────────────────────────────────────────────────
document.getElementById("firstName").value  = localStorage.getItem("meridian_firstName")  || "";
document.getElementById("middleName").value = localStorage.getItem("meridian_middleName") || "";
document.getElementById("lastName").value   = localStorage.getItem("meridian_lastName")   || "";

// ── Save name ────────────────────────────────────────────────────────────────
document.getElementById("saveNameBtn").addEventListener("click", async () => {
  const btn    = document.getElementById("saveNameBtn");
  const msg    = document.getElementById("saveMsg");
  const first  = document.getElementById("firstName").value.trim();
  const middle = document.getElementById("middleName").value.trim();
  const last   = document.getElementById("lastName").value.trim();

  if (!first) {
    msg.className = "save-msg show error";
    msg.textContent = "First name is required.";
    setTimeout(() => msg.classList.remove("show"), 3000);
    return;
  }

  btn.classList.add("loading"); btn.disabled = true;

  const fullName = [first, middle, last].filter(Boolean).join(" ");

  localStorage.setItem("meridian_firstName",  first);
  localStorage.setItem("meridian_middleName", middle);
  localStorage.setItem("meridian_lastName",   last);

  // Patch session cache immediately (instant UI feedback)
  try {
    const raw = localStorage.getItem("meridian_session");
    if (raw) {
      const s = JSON.parse(raw);
      s.displayName = fullName;
      localStorage.setItem("meridian_session", JSON.stringify(s));
    }
  } catch {}

  // Persist permanently: Firestore (source of truth on next login) + Supabase (admin console mirror)
  let persisted = true;
  try {
    const { getFirestore, doc, updateDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getFirebaseConfig } = await import("./JS/config.js");
const firebaseConfig = await getFirebaseConfig();
initializeApp(firebaseConfig);
    const db = getFirestore(app);
    if (session.uid) {
      await updateDoc(doc(db, "users", session.uid), { displayName: fullName });
    }
  } catch (err) {
    console.warn("[settings] Firestore name persist failed:", err);
    persisted = false;
  }

  try {
    if (session.uid) {
      const { upsertUser } = await import("./JS/supabase.js");
      await upsertUser({
        id: session.uid,
        portalId: session.portalId,
        displayName: fullName,
        email: session.email,
        role: session.role
      });
    }
  } catch (err) {
    console.warn("[settings] Supabase name mirror failed (non-fatal):", err);
  }

  if (window._settingsOnSave) window._settingsOnSave(first);

  setTimeout(() => {
    btn.classList.remove("loading"); btn.disabled = false;
    msg.className = "save-msg show " + (persisted ? "success" : "error");
    msg.textContent = persisted
      ? `Saved — greeting shows "${first}"`
      : `Saved locally, but couldn't sync to your account. Try again when online.`;
    setTimeout(() => msg.classList.remove("show"), 3500);
  }, 350);
});

// ── Use Account Default ──────────────────────────────────────────────────────
document.getElementById("clearNameBtn").addEventListener("click", () => {
  const msg = document.getElementById("saveMsg");
  ["meridian_firstName","meridian_middleName","meridian_lastName"].forEach(k => localStorage.removeItem(k));
  document.getElementById("firstName").value  = "";
  document.getElementById("middleName").value = "";
  document.getElementById("lastName").value   = "";

  try {
    const raw = localStorage.getItem("meridian_session");
    if (raw) {
      const s = JSON.parse(raw);
      s.displayName = firebaseDisplayName;
      localStorage.setItem("meridian_session", JSON.stringify(s));
    }
  } catch {}

  const defaultFirst = (firebaseDisplayName || "").trim().split(" ")[0];
  if (window._settingsOnSave) window._settingsOnSave(defaultFirst || firebaseDisplayName);

  msg.className = "save-msg show success";
  msg.textContent = "Using account default";
  setTimeout(() => msg.classList.remove("show"), 3000);
});

// Enter key
["firstName","middleName","lastName"].forEach(id => {
  document.getElementById(id)?.addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("saveNameBtn").click();
  });
});

// ── Storage ──────────────────────────────────────────────────────────────────
function fmt(bytes) {
  if (!bytes || bytes === Infinity || isNaN(bytes)) return "—";
  if (bytes < 1024)           return bytes + " B";
  if (bytes < 1024*1024)      return (bytes/1024).toFixed(1) + " KB";
  if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + " MB";
  return (bytes/(1024*1024*1024)).toFixed(2) + " GB";
}

async function countCachedItems() {
  let videos = 0, pdfs = 0;
  try {
    let getDB;
    try { ({ getDB } = await import("./JS/db.js")); }
    catch { ({ getDB } = await import("./db.js")); }
    const db = await getDB();
    videos = await new Promise(res => {
      try {
        const req = db.transaction("download_metadata","readonly").objectStore("download_metadata").getAll();
        req.onsuccess = () => res((req.result||[]).filter(m=>m.status==="complete").length);
        req.onerror   = () => res(0);
      } catch { res(0); }
    });
    pdfs = await new Promise(res => {
      try {
        const req = db.transaction("pdf_blobs","readonly").objectStore("pdf_blobs").count();
        req.onsuccess = () => res(req.result||0);
        req.onerror   = () => res(0);
      } catch { res(0); }
    });
  } catch {}
  return { videos, pdfs };
}

async function refreshStorage() {
  if (!navigator.storage?.estimate) {
    document.getElementById("storageTotal").textContent = "Storage API not available";
    return;
  }
  const { usage=0, quota=0 } = await navigator.storage.estimate();
  const pct   = quota > 0 ? Math.round((usage/quota)*100) : 0;
  const free  = quota - usage;
  const level = pct >= 90 ? "block" : pct >= 80 ? "warn" : "ok";

  document.getElementById("storageUsed").textContent    = fmt(usage);
  document.getElementById("storageTotal").textContent   = `of ${fmt(quota)} available`;
  document.getElementById("storageBar").style.width     = Math.min(pct,100) + "%";
  document.getElementById("storageBar").className       = `bar-fill ${level}`;
  document.getElementById("storageBarPct").textContent  = pct + "% used";
  document.getElementById("storageBarFree").textContent = fmt(free) + " free";
  document.getElementById("breakdownUsed").textContent  = fmt(usage);
  document.getElementById("breakdownFree").textContent  = fmt(free);
  document.getElementById("storageLevel").className     = `storage-level ${level}`;
  document.getElementById("storageLevelText").textContent =
    level === "block" ? "Storage Full" : level === "warn" ? "Getting Full" : "Good";

  const { videos, pdfs } = await countCachedItems();
  document.getElementById("breakdownVideos").textContent = videos + " lecture" + (videos!==1?"s":"");
  document.getElementById("breakdownPdfs").textContent   = pdfs + " PDF" + (pdfs!==1?"s":"");
}

refreshStorage();

// ── Clear cache ──────────────────────────────────────────────────────────────
document.getElementById("dumpBtn").addEventListener("click", async () => {
  const btn = document.getElementById("dumpBtn");
  const msg = document.getElementById("dumpMsg");
  btn.classList.add("loading"); btn.disabled = true;
  msg.className = "dump-msg";
  try {
    let getDB;
    try { ({ getDB } = await import("./JS/db.js")); }
    catch { ({ getDB } = await import("./db.js")); }
    const db = await getDB();
    const clear = store => new Promise(res => {
      try {
        const req = db.transaction(store,"readwrite").objectStore(store).clear();
        req.onsuccess = res; req.onerror = res;
      } catch { res(); }
    });
    await clear("video_chunks");
    await clear("download_metadata");
    await clear("pdf_blobs");
    if (typeof caches !== "undefined") {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    await refreshStorage();
    msg.className = "dump-msg show";
    msg.textContent = "Cache successfully cleared";
    setTimeout(() => msg.classList.remove("show"), 3000);
  } catch (err) {
    msg.className = "dump-msg show";
    msg.style.color = "var(--red)";
    msg.textContent = "Failed to clear cache";
  } finally {
    btn.classList.remove("loading"); btn.disabled = false;
  }
});
</script>

<script>
if ("serviceWorker" in navigator && !window._settingsEmbedded) {
  navigator.serviceWorker.register("/sw.js").catch(()=>{});

  let _swRefreshed = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (_swRefreshed) return;
    _swRefreshed = true;
    window.location.reload();
  });
}
</script>
</body>
</html>
